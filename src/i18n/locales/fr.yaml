home:
  hero:
    title: Starter Frontend
    description: Un kit de démarrage Vue 3 moderne, prêt à l'emploi, avec authentification, notifications, gestion du profil et bien plus.
  stack:
    label: Construit avec
  features:
    title: Fonctionnalités incluses
    auth:
      title: Authentification JWT
      description: Connexion, inscription, réinitialisation de mot de passe et vérification d'e-mail avec tokens d'accès et de rafraîchissement.
    profile:
      title: Gestion du profil
      description: Modification des informations personnelles, changement d'adresse e-mail et de mot de passe, suppression de compte.
    notifications:
      title: Notifications
      description: Historique paginé avec marquage lu/non-lu, suppression unitaire ou en lot et préférences de canaux.
    i18n:
      title: Internationalisation
      description: Support multilingue (FR/EN) via vue-i18n et fichiers YAML, facilement extensible à d'autres langues.
    architecture:
      title: Architecture hexagonale
      description: Séparation claire entre domaine, infrastructure et interface. Repositories, stores et types bien organisés.
    stack:
      title: Stack moderne
      description: Vue 3, TypeScript, Vite, Pinia, Tailwind CSS v4 et shadcn-vue pour un développement rapide et robuste.


cgu:
  title: Conditions Générales d'Utilisation
  s1:
    title: '1. Acceptation des CGU'
    content: >
      En accédant ou en utilisant ce site ou cette application (ci-après « la Plateforme »),
      vous acceptez sans réserve les présentes Conditions Générales d'Utilisation.
      Si vous n'acceptez pas ces conditions, veuillez ne pas utiliser la Plateforme.
  s2:
    title: '2. Description du service'
    content: >
      La Plateforme est une interface utilisateur conçue pour [décrire brièvement le but de la Plateforme,
      par exemple : "faciliter l'accès à des fonctionnalités de base pour les développeurs ou utilisateurs finaux"].
      Les fonctionnalités peuvent évoluer sans préavis.
  s3:
    title: '3. Accès et utilisation'
    content: >
      L'accès à la Plateforme est réservé aux utilisateurs disposant d'une connexion internet.
      Vous vous engagez à utiliser la Plateforme conformément aux lois en vigueur
      et à ne pas perturber son fonctionnement.
  s4:
    title: '4. Propriété intellectuelle'
    content: >
      Tous les contenus, codes, designs et marques présents sur la Plateforme
      sont la propriété exclusive de [Nom de l'entreprise ou du projet].
      Toute reproduction ou utilisation non autorisée est interdite.
  s5:
    title: '5. Responsabilités'
    content: >
      La Plateforme est fournie « en l'état ». [Nom de l'entreprise ou du projet]
      ne garantit pas son fonctionnement ininterrompu ou sans erreur.
      Vous utilisez la Plateforme à vos propres risques.
  s6:
    title: '6. Données personnelles'
    content: >
      Les données collectées via la Plateforme sont traitées conformément à notre Politique de Confidentialité.
      Nous nous engageons à respecter les réglementations en vigueur, notamment le RGPD.
  s7:
    title: '7. Modification des CGU'
    content: >
      Nous nous réservons le droit de modifier les présentes CGU à tout moment.
      Les modifications seront publiées sur cette page et entreront en vigueur dès leur publication.
  s8:
    title: '8. Résiliation'
    content: >
      Nous nous réservons le droit de suspendre ou résilier l'accès à la Plateforme
      à tout utilisateur ne respectant pas les présentes CGU.
  s9:
    title: '9. Loi applicable'
    content: >
      Les présentes CGU sont régies par le droit français.
      Tout litige sera soumis à la compétence exclusive des tribunaux de [Ville ou Pays].
  s10:
    title: '10. Contact'
    content: >
      Pour toute question concernant les CGU, contactez-nous à l'adresse suivante : [email].


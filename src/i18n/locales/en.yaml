home:
  hero:
    title: Starter Frontend
    description: A modern Vue 3 starter kit, ready to use, with authentication, notifications, profile management and more.
  stack:
    label: Built with
  features:
    title: Included features
    auth:
      title: JWT Authentication
      description: Login, registration, password reset and email verification with access and refresh tokens.
    profile:
      title: Profile management
      description: Edit personal information, change email address and password, delete account.
    notifications:
      title: Notifications
      description: Paginated history with read/unread marking, single or bulk deletion and channel preferences.
    i18n:
      title: Internationalization
      description: Multilingual support (FR/EN) via vue-i18n and YAML files, easily extensible to other languages.
    architecture:
      title: Hexagonal architecture
      description: Clear separation between domain, infrastructure and interface. Well-organized repositories, stores and types.
    stack:
      title: Modern stack
      description: Vue 3, TypeScript, Vite, Pinia, Tailwind CSS v4 and shadcn-vue for fast and robust development.


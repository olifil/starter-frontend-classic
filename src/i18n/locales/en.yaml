cgu:
  title: Terms of Service
  s1:
    title: '1. Acceptance of Terms'
    content: >
      By accessing or using this website or application (hereinafter "the Platform"),
      you unreservedly accept these Terms of Service.
      If you do not accept these terms, please do not use the Platform.
  s2:
    title: '2. Description of Service'
    content: >
      The Platform is a user interface designed to [briefly describe the purpose of the Platform,
      for example: "provide basic features for developers or end users"].
      Features may evolve without notice.
  s3:
    title: '3. Access and Use'
    content: >
      Access to the Platform is reserved for users with an internet connection.
      You agree to use the Platform in compliance with applicable laws
      and not to disrupt its operation.
  s4:
    title: '4. Intellectual Property'
    content: >
      All content, code, designs and trademarks on the Platform are the exclusive property
      of [Company or Project Name].
      Any unauthorized reproduction or use is prohibited.
  s5:
    title: '5. Liability'
    content: >
      The Platform is provided "as is". [Company or Project Name] does not guarantee
      its uninterrupted or error-free operation.
      You use the Platform at your own risk.
  s6:
    title: '6. Personal Data'
    content: >
      Data collected through the Platform is processed in accordance with our Privacy Policy.
      We are committed to complying with applicable regulations, including the GDPR.
  s7:
    title: '7. Amendments to the Terms'
    content: >
      We reserve the right to modify these Terms at any time.
      Changes will be published on this page and will take effect upon publication.
  s8:
    title: '8. Termination'
    content: >
      We reserve the right to suspend or terminate access to the Platform
      for any user who fails to comply with these Terms.
  s9:
    title: '9. Applicable Law'
    content: >
      These Terms are governed by French law.
      Any dispute shall be subject to the exclusive jurisdiction of the courts of [City or Country].
  s10:
    title: '10. Contact'
    content: >
      For any questions regarding the Terms, please contact us at: [email].

legal-notice:
  title: Legal Notice
  s1:
    title: '1. Publisher'
    content: >
      [Name / Company] — [Legal form] — [Share capital if applicable].
      Registered office: [Full address]. SIRET: [SIRET number].
      Contact: [email].
  s2:
    title: '2. Publication Director'
    content: >
      [First name Last name].
  s3:
    title: '3. Hosting'
    content: >
      [Host name], [Host address]. Website: [host url].
  s4:
    title: '4. Intellectual Property'
    content: >
      All content on this site (texts, images, logo) is the exclusive property
      of [Name / Company], unless otherwise stated. Any reproduction is prohibited without prior authorization.
  s5:
    title: '5. Personal Data'
    content: >
      This site does not collect any personal data without your consent. In accordance with the GDPR,
      you have the right to access, rectify and delete your data by contacting: [email].
  s6:
    title: '6. Cookies'
    content: >
      This site does not use cookies / only uses technical cookies necessary for its operation.
